version: '3.8'

services:
  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    ports:
      - "9050:9050"
    command: [ "--project", "ic-origin-v2", "--data-from-yaml", "/app/schema.yaml" ]
    volumes:
      - ./tests/bq_schema.yaml:/app/schema.yaml

  postgres-alloydb-mock:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_DB: ic_origin_themav2
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d ic_origin_themav2" ]
      interval: 5s
      timeout: 5s
      retries: 5
